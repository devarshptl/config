theme = "catppuccin-mocha"

option-as-alt = 'both'
confirm-before-quit = true

[renderer]
performance = "High"

[keyboard]
use-kitty-keyboard-protocol = true
disable-ctlseqs-alt = false

[window]
opacity = 0.9
blur = true
decorations = "Enabled"

[fonts]
family = "SauceCodePro Nerd Font"
size = 13

[fonts.regular]
weight = 500

[fonts.bold]
weight = 700

[fonts.italic]
weight = 500

[fonts.bold-italic]
weight = 700

[cursor]
shape = "underline"
blinking = true

[editor]
program = "nvim"
args = []
